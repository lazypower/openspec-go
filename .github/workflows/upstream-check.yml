name: Upstream Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly, Monday 9am UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  upstream-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build upstream-check container
        run: |
          docker build \
            -f containers/upstream-check/Containerfile \
            -t openspec-upstream-check \
            .

      - name: Run upstream check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -e GITHUB_REPOSITORY \
            -v "$PWD/UPSTREAM.md:/work/UPSTREAM.md:ro" \
            openspec-upstream-check \
            --repo "$GITHUB_REPOSITORY"
