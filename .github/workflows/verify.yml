name: Verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jetify-com/devbox-install-action@v0.12.0
      - name: Run tests
        run: devbox run -- go test ./... -count=1 -race
      - name: Run coverage
        run: |
          devbox run -- go test ./... -count=1 -coverprofile=coverage.out -covermode=atomic
          devbox run -- go tool cover -func=coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jetify-com/devbox-install-action@v0.12.0
      - name: Vet
        run: devbox run -- go vet ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jetify-com/devbox-install-action@v0.12.0
      - name: Build binary
        run: |
          mkdir -p bin
          devbox run -- go build -o bin/openspec ./cmd/openspec

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build verification container
        run: docker build -f containers/verify/Containerfile -t openspec-verify .

      - name: Run cross-reference audit
        run: docker run --rm openspec-verify audit

      - name: Run format compatibility check
        run: docker run --rm openspec-verify compat
