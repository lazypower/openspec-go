name: Verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jetify-com/devbox-install-action@v0.15.0
      - name: Run tests
        run: devbox run -- go test ./... -count=1 -race
      - name: Run coverage
        run: |
          devbox run -- go test ./... -count=1 -coverprofile=coverage.out -covermode=atomic
          devbox run -- go tool cover -func=coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jetify-com/devbox-install-action@v0.15.0
      - name: Vet
        run: devbox run -- go vet ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jetify-com/devbox-install-action@v0.15.0
      - name: Build binary
        run: |
          mkdir -p bin
          devbox run -- go build -o bin/openspec ./cmd/openspec
