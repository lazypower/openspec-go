name: Verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jetify-com/devbox-install-action@v0.12.0
      - run: make test
      - run: make cover

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build verification container
        run: docker build -f containers/verify/Containerfile -t openspec-verify .

      - name: Run cross-reference audit
        run: docker run --rm openspec-verify audit

      - name: Run format compatibility check
        run: docker run --rm openspec-verify compat
